<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evawero Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #1D9E75; --brand-dark: #0F6E56; --brand-light: #e8f7f2;
      --text: #111; --text-mid: #444; --text-muted: #888; --rule: #e8e8e4;
      --bg: #fafafa; --white: #fff; --danger: #dc2626;
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--brand); text-decoration: none; }
    a:hover { color: var(--brand-dark); }

    /* Login */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; padding: 40px; width: 100%; max-width: 380px; }
    .login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }

    /* Layout */
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--white); border-right: 1px solid var(--rule); padding: 20px 0; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; }
    .sidebar h2 { font-size: 15px; font-weight: 700; color: var(--brand-dark); padding: 0 20px; margin-bottom: 24px; }
    .sidebar a { display: block; padding: 10px 20px; font-size: 14px; color: var(--text-mid); transition: all .15s; }
    .sidebar a:hover, .sidebar a.active { background: var(--brand-light); color: var(--brand-dark); }
    .sidebar .logout { margin-top: 24px; border-top: 1px solid var(--rule); padding-top: 12px; }
    .sidebar .logout a { color: var(--danger); }
    .main { margin-left: 240px; flex: 1; padding: 32px; max-width: 900px; }
    .main h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

    /* Table */
    .table-wrap { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 12px 16px; background: var(--bg); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); border-bottom: 1px solid var(--rule); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--rule); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9faf9; }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--rule); border-radius: 6px; font-size: 14px; font-family: inherit; background: var(--white); transition: border-color .15s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--brand); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .form-group .help { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .checkbox-group { display: flex; align-items: center; gap: 8px; }
    .checkbox-group input { width: auto; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; font-size: 14px; font-weight: 500; border: none; border-radius: 6px; cursor: pointer; transition: all .15s; font-family: inherit; }
    .btn-primary { background: var(--brand); color: white; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-secondary { background: var(--white); color: var(--text-mid); border: 1px solid var(--rule); }
    .btn-secondary:hover { background: var(--bg); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-row { display: flex; gap: 8px; margin-top: 20px; }

    /* Alerts */
    .alert { padding: 12px 16px; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
    .alert-success { background: var(--brand-light); color: var(--brand-dark); }
    .alert-error { background: #fef2f2; color: var(--danger); }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: relative; border-right: none; border-bottom: 1px solid var(--rule); padding: 12px 0; }
      .sidebar a { display: inline-block; padding: 8px 16px; }
      .app { flex-direction: column; }
      .main { margin-left: 0; padding: 20px; }
    }

    .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-wrap">
    <div class="login-box">
      <h1>Evawero Admin</h1>
      <div id="login-error" class="alert alert-error hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
      </form>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app-shell" class="app hidden">
    <nav class="sidebar">
      <h2>Evawero Admin</h2>
      <a href="#" data-section="dashboard" class="active">Dashboard</a>
      <a href="#" data-section="services">Services</a>
      <a href="#" data-section="products">Products</a>
      <a href="#" data-section="blog-posts">Blog Posts</a>
      <a href="#" data-section="team-members">Team</a>
      <a href="#" data-section="site-settings">Site Settings</a>
      <div class="logout">
        <a href="#" id="logout-btn">Sign Out</a>
      </div>
    </nav>
    <div class="main" id="content"></div>
  </div>

  <script>
    const API = window.location.origin;

    // ── Helpers ──────────────────────────────────────────────
    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', ...opts.headers },
        ...opts,
      });
      if (res.status === 401) { showLogin(); throw new Error('Unauthorized'); }
      return res.json();
    }

    function $(sel) { return document.querySelector(sel); }
    function $$(sel) { return document.querySelectorAll(sel); }
    function html(el, h) { el.innerHTML = h; }
    function show(el) { el.classList.remove('hidden'); }
    function hide(el) { el.classList.add('hidden'); }

    // ── Auth ─────────────────────────────────────────────────
    function showLogin() { show($('#login-screen')); hide($('#app-shell')); }
    function showApp() { hide($('#login-screen')); show($('#app-shell')); navigate('dashboard'); }

    $('#login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hide($('#login-error'));
      try {
        const res = await api('/api/admin/login', {
          method: 'POST',
          body: JSON.stringify({ email: $('#login-email').value, password: $('#login-password').value }),
        });
        if (res.success) showApp();
        else throw new Error(res.error);
      } catch (err) {
        html($('#login-error'), err.message || 'Login failed');
        show($('#login-error'));
      }
    });

    $('#logout-btn').addEventListener('click', async (e) => {
      e.preventDefault();
      await api('/api/admin/logout', { method: 'POST' });
      showLogin();
    });

    // Check session on load
    api('/api/admin/me').then(() => showApp()).catch(() => showLogin());

    // ── Navigation ───────────────────────────────────────────
    $$('.sidebar a[data-section]').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        navigate(a.dataset.section);
      });
    });

    function navigate(section) {
      $$('.sidebar a[data-section]').forEach(a => a.classList.toggle('active', a.dataset.section === section));
      const handlers = { dashboard: renderDashboard, services: renderServices, products: renderProducts, 'blog-posts': renderBlogPosts, 'team-members': renderTeamMembers, 'site-settings': renderSiteSettings };
      (handlers[section] || renderDashboard)();
    }

    // ── Dashboard ────────────────────────────────────────────
    async function renderDashboard() {
      html($('#content'), '<h1>Dashboard</h1><p style="color:var(--text-muted)">Loading...</p>');
      try {
        const [services, products, posts, team] = await Promise.all([
          api('/api/admin/services'), api('/api/admin/products'), api('/api/admin/blog-posts'), api('/api/admin/team-members'),
        ]);
        html($('#content'), `
          <h1>Dashboard</h1>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">
            ${statCard('Services', services.length)}
            ${statCard('Products', products.length)}
            ${statCard('Blog Posts', posts.length)}
            ${statCard('Team Members', team.length)}
          </div>
        `);
      } catch (e) { html($('#content'), '<h1>Dashboard</h1><p>Failed to load stats.</p>'); }
    }

    function statCard(label, count) {
      return `<div style="background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:20px;">
        <div style="font-size:28px;font-weight:700;color:var(--brand-dark);">${count}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">${label}</div>
      </div>`;
    }

    // ══════════════════════════════════════════════════════════
    //  GENERIC CRUD RENDERER
    // ══════════════════════════════════════════════════════════
    function crudList(title, endpoint, columns, formFields, formatRow) {
      return async function render() {
        html($('#content'), `<h1>${title}</h1><p style="color:var(--text-muted)">Loading...</p>`);
        const items = await api(`/api/admin/${endpoint}`);
        const colHeaders = columns.map(c => `<th>${c.label}</th>`).join('') + '<th style="width:100px;">Actions</th>';
        const rows = items.length ? items.map(item => {
          const cells = columns.map(c => `<td>${formatRow ? formatRow(item, c.key) : (item[c.key] || '—')}</td>`).join('');
          return `<tr>${cells}<td>
            <button class="btn btn-secondary btn-sm" onclick="editItem_${endpoint.replace(/-/g,'_')}(${item.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem('${endpoint}', ${item.id}, renderFn_${endpoint.replace(/-/g,'_')})">Del</button>
          </td></tr>`;
        }).join('') : `<tr><td colspan="${columns.length + 1}" class="empty">No ${title.toLowerCase()} yet.</td></tr>`;

        html($('#content'), `
          <h1>${title}</h1>
          <button class="btn btn-primary" onclick="showForm_${endpoint.replace(/-/g,'_')}()" style="margin-bottom:16px;">+ Add New</button>
          <div id="form-area-${endpoint}"></div>
          <div id="alert-area-${endpoint}"></div>
          <div class="table-wrap"><table><thead><tr>${colHeaders}</tr></thead><tbody>${rows}</tbody></table></div>
        `);
      };
    }

    function showAlert(endpoint, message, type = 'success') {
      const el = document.getElementById(`alert-area-${endpoint}`);
      if (el) {
        html(el, `<div class="alert alert-${type}">${message}</div>`);
        setTimeout(() => html(el, ''), 3000);
      }
    }

    async function deleteItem(endpoint, id, refreshFn) {
      if (!confirm('Are you sure you want to delete this item?')) return;
      await api(`/api/admin/${endpoint}/${id}`, { method: 'DELETE' });
      await refreshFn();
      showAlert(endpoint, 'Item deleted successfully.');
    }

    function buildForm(fields, data = {}) {
      return fields.map(f => {
        const val = data[f.key] || '';
        if (f.type === 'textarea') {
          return `<div class="form-group"><label>${f.label}</label><textarea name="${f.key}" rows="${f.rows || 4}">${val}</textarea>${f.help ? `<div class="help">${f.help}</div>` : ''}</div>`;
        }
        if (f.type === 'select') {
          const opts = f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('');
          return `<div class="form-group"><label>${f.label}</label><select name="${f.key}"><option value="">— Select —</option>${opts}</select></div>`;
        }
        if (f.type === 'checkbox') {
          return `<div class="form-group"><div class="checkbox-group"><input type="checkbox" name="${f.key}" ${val ? 'checked' : ''}><label>${f.label}</label></div></div>`;
        }
        if (f.type === 'array') {
          const arr = Array.isArray(val) ? val.join('\n') : (val || '');
          return `<div class="form-group"><label>${f.label}</label><textarea name="${f.key}" rows="4">${arr}</textarea><div class="help">One item per line</div></div>`;
        }
        return `<div class="form-group"><label>${f.label}</label><input type="${f.type || 'text'}" name="${f.key}" value="${String(val).replace(/"/g, '&quot;')}"></div>`;
      }).join('');
    }

    function getFormData(formEl, fields) {
      const data = {};
      fields.forEach(f => {
        if (f.type === 'checkbox') {
          data[f.key] = formEl.querySelector(`[name="${f.key}"]`).checked;
        } else if (f.type === 'array') {
          data[f.key] = formEl.querySelector(`[name="${f.key}"]`).value.split('\n').map(s => s.trim()).filter(Boolean);
        } else {
          data[f.key] = formEl.querySelector(`[name="${f.key}"]`).value;
        }
      });
      return data;
    }

    // ══════════════════════════════════════════════════════════
    //  SERVICES
    // ══════════════════════════════════════════════════════════
    const serviceFields = [
      { key: 'title', label: 'Title' },
      { key: 'slug', label: 'Slug' },
      { key: 'icon', label: 'Icon', help: 'Icon name: brain, zap, globe, target, chart, etc.' },
      { key: 'short_description', label: 'Short Description', type: 'textarea', rows: 2 },
      { key: 'full_description', label: 'Full Description', type: 'textarea', rows: 6 },
      { key: 'who_is_it_for', label: 'Who Is It For', type: 'textarea', rows: 2 },
      { key: 'whats_included', label: "What's Included", type: 'array' },
      { key: 'sort_order', label: 'Sort Order', type: 'number' },
    ];

    const renderServices = crudList('Services', 'services',
      [{ key: 'title', label: 'Title' }, { key: 'short_description', label: 'Description' }, { key: 'sort_order', label: 'Order' }],
      serviceFields
    );
    window.renderFn_services = renderServices;

    window.showForm_services = function(data = {}) {
      const isEdit = !!data.id;
      html($(`#form-area-services`), `
        <div style="background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:24px;margin-bottom:16px;">
          <h3 style="margin-bottom:16px;">${isEdit ? 'Edit' : 'Add'} Service</h3>
          <form id="service-form">${buildForm(serviceFields, data)}
            <div class="btn-row">
              <button type="submit" class="btn btn-primary">${isEdit ? 'Update' : 'Create'}</button>
              <button type="button" class="btn btn-secondary" onclick="html($('#form-area-services'),'')">Cancel</button>
            </div>
          </form>
        </div>
      `);
      $('#service-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = getFormData(e.target, serviceFields);
        body.sort_order = parseInt(body.sort_order) || 0;
        if (isEdit) await api(`/api/admin/services/${data.id}`, { method: 'PUT', body: JSON.stringify(body) });
        else await api('/api/admin/services', { method: 'POST', body: JSON.stringify(body) });
        await renderServices();
        showAlert('services', isEdit ? 'Service updated successfully.' : 'Service created successfully.');
      });
    };

    window.editItem_services = async function(id) {
      const item = await api(`/api/admin/services/${id}`);
      showForm_services(item);
    };

    // ══════════════════════════════════════════════════════════
    //  PRODUCTS
    // ══════════════════════════════════════════════════════════
    const productFields = [
      { key: 'name', label: 'Name' },
      { key: 'slug', label: 'Slug' },
      { key: 'tagline', label: 'Tagline' },
      { key: 'description', label: 'Description', type: 'textarea', rows: 6 },
      { key: 'features', label: 'Features', type: 'array' },
      { key: 'link', label: 'Link (URL)' },
      { key: 'pricing_free', label: 'Free Tier Pricing' },
      { key: 'pricing_pro', label: 'Pro Tier Pricing' },
      { key: 'badges', label: 'Badges', type: 'array' },
      { key: 'is_featured', label: 'Featured', type: 'checkbox' },
      { key: 'coming_soon', label: 'Coming Soon', type: 'checkbox' },
    ];

    const renderProducts = crudList('Products', 'products',
      [{ key: 'name', label: 'Name' }, { key: 'tagline', label: 'Tagline' }, { key: 'is_featured', label: 'Featured' }],
      productFields,
      (item, key) => key === 'is_featured' ? (item[key] ? 'Yes' : 'No') : (item[key] || '—')
    );
    window.renderFn_products = renderProducts;

    window.showForm_products = function(data = {}) {
      const isEdit = !!data.id;
      html($(`#form-area-products`), `
        <div style="background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:24px;margin-bottom:16px;">
          <h3 style="margin-bottom:16px;">${isEdit ? 'Edit' : 'Add'} Product</h3>
          <form id="product-form">${buildForm(productFields, data)}
            <div class="btn-row">
              <button type="submit" class="btn btn-primary">${isEdit ? 'Update' : 'Create'}</button>
              <button type="button" class="btn btn-secondary" onclick="html($('#form-area-products'),'')">Cancel</button>
            </div>
          </form>
        </div>
      `);
      $('#product-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = getFormData(e.target, productFields);
        if (isEdit) await api(`/api/admin/products/${data.id}`, { method: 'PUT', body: JSON.stringify(body) });
        else await api('/api/admin/products', { method: 'POST', body: JSON.stringify(body) });
        await renderProducts();
        showAlert('products', isEdit ? 'Product updated successfully.' : 'Product created successfully.');
      });
    };

    window.editItem_products = async function(id) {
      const item = await api(`/api/admin/products/${id}`);
      showForm_products(item);
    };

    // ══════════════════════════════════════════════════════════
    //  BLOG POSTS
    // ══════════════════════════════════════════════════════════
    const blogFields = [
      { key: 'title', label: 'Title' },
      { key: 'slug', label: 'Slug' },
      { key: 'excerpt', label: 'Excerpt', type: 'textarea', rows: 2 },
      { key: 'content', label: 'Content (HTML)', type: 'textarea', rows: 12 },
      { key: 'cover_image', label: 'Cover Image URL' },
      { key: 'author', label: 'Author' },
      { key: 'published_date', label: 'Published Date', type: 'date' },
      { key: 'category', label: 'Category', type: 'select', options: ['AI', 'Automation', 'Web', 'Digital Marketing', 'News'] },
      { key: 'status', label: 'Status', type: 'select', options: ['draft', 'published'] },
    ];

    const renderBlogPosts = crudList('Blog Posts', 'blog-posts',
      [{ key: 'title', label: 'Title' }, { key: 'status', label: 'Status' }, { key: 'category', label: 'Category' }],
      blogFields,
      (item, key) => {
        if (key === 'status') return `<span style="color:${item[key]==='published' ? 'var(--brand)' : 'var(--text-muted)'}">${item[key]}</span>`;
        return item[key] || '—';
      }
    );
    window['renderFn_blog_posts'] = renderBlogPosts;

    window['showForm_blog_posts'] = function(data = {}) {
      const isEdit = !!data.id;
      if (data.published_date) data.published_date = data.published_date.slice(0, 10);
      html($(`#form-area-blog-posts`), `
        <div style="background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:24px;margin-bottom:16px;">
          <h3 style="margin-bottom:16px;">${isEdit ? 'Edit' : 'Add'} Blog Post</h3>
          <form id="blog-form">${buildForm(blogFields, data)}
            <div class="btn-row">
              <button type="submit" class="btn btn-primary">${isEdit ? 'Update' : 'Create'}</button>
              <button type="button" class="btn btn-secondary" onclick="html($('#form-area-blog-posts'),'')">Cancel</button>
            </div>
          </form>
        </div>
      `);
      $('#blog-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = getFormData(e.target, blogFields);
        if (isEdit) await api(`/api/admin/blog-posts/${data.id}`, { method: 'PUT', body: JSON.stringify(body) });
        else await api('/api/admin/blog-posts', { method: 'POST', body: JSON.stringify(body) });
        await renderBlogPosts();
        showAlert('blog-posts', isEdit ? 'Blog post updated successfully.' : 'Blog post created successfully.');
      });
    };

    window['editItem_blog_posts'] = async function(id) {
      const item = await api(`/api/admin/blog-posts/${id}`);
      showForm_blog_posts(item);
    };

    // ══════════════════════════════════════════════════════════
    //  TEAM MEMBERS
    // ══════════════════════════════════════════════════════════
    const teamFields = [
      { key: 'name', label: 'Name' },
      { key: 'role', label: 'Role' },
      { key: 'bio', label: 'Bio', type: 'textarea', rows: 4 },
      { key: 'photo', label: 'Photo URL' },
      { key: 'sort_order', label: 'Sort Order', type: 'number' },
    ];

    const renderTeamMembers = crudList('Team Members', 'team-members',
      [{ key: 'name', label: 'Name' }, { key: 'role', label: 'Role' }, { key: 'sort_order', label: 'Order' }],
      teamFields
    );
    window['renderFn_team_members'] = renderTeamMembers;

    window['showForm_team_members'] = function(data = {}) {
      const isEdit = !!data.id;
      html($(`#form-area-team-members`), `
        <div style="background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:24px;margin-bottom:16px;">
          <h3 style="margin-bottom:16px;">${isEdit ? 'Edit' : 'Add'} Team Member</h3>
          <form id="team-form">${buildForm(teamFields, data)}
            <div class="btn-row">
              <button type="submit" class="btn btn-primary">${isEdit ? 'Update' : 'Create'}</button>
              <button type="button" class="btn btn-secondary" onclick="html($('#form-area-team-members'),'')">Cancel</button>
            </div>
          </form>
        </div>
      `);
      $('#team-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = getFormData(e.target, teamFields);
        body.sort_order = parseInt(body.sort_order) || 0;
        if (isEdit) await api(`/api/admin/team-members/${data.id}`, { method: 'PUT', body: JSON.stringify(body) });
        else await api('/api/admin/team-members', { method: 'POST', body: JSON.stringify(body) });
        await renderTeamMembers();
        showAlert('team-members', isEdit ? 'Team member updated successfully.' : 'Team member created successfully.');
      });
    };

    window['editItem_team_members'] = async function(id) {
      const item = await api(`/api/admin/team-members/${id}`);
      showForm_team_members(item);
    };

    // ══════════════════════════════════════════════════════════
    //  SITE SETTINGS
    // ══════════════════════════════════════════════════════════
    async function renderSiteSettings() {
      html($('#content'), '<h1>Site Settings</h1><p style="color:var(--text-muted)">Loading...</p>');
      let data;
      try {
        data = await api('/api/admin/site-settings');
      } catch (err) {
        html($('#content'), `<h1>Site Settings</h1><div class="alert alert-error">Failed to load settings: ${err.message}</div>`);
        return;
      }
      const whyUs = Array.isArray(data.why_choose_us) ? data.why_choose_us : (typeof data.why_choose_us === 'string' ? JSON.parse(data.why_choose_us) : []);

      html($('#content'), `
        <h1>Site Settings</h1>
        <div id="settings-alert"></div>
        <div style="background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:24px;">
          <form id="settings-form">
            <div class="form-group"><label>Tagline</label><input name="tagline" value="${(data.tagline||'').replace(/"/g,'&quot;')}"></div>
            <div class="form-group"><label>Mission Statement</label><textarea name="mission_statement" rows="4">${data.mission_statement||''}</textarea></div>
            <div class="form-group"><label>SEO Title</label><input name="seo_title" value="${(data.seo_title||'').replace(/"/g,'&quot;')}"></div>
            <div class="form-group"><label>SEO Description</label><textarea name="seo_description" rows="2">${data.seo_description||''}</textarea></div>
            <div class="form-group"><label>Contact Email</label><input type="email" name="contact_email" value="${data.contact_email||''}"></div>
            <div class="form-group"><label>Contact Phone</label><input name="contact_phone" value="${data.contact_phone||''}"></div>

            <h3 style="margin:24px 0 12px;font-size:15px;">Social Links</h3>
            <div class="form-group"><label>LinkedIn</label><input name="social_linkedin" value="${(data.social_links?.linkedin||'').replace(/"/g,'&quot;')}"></div>
            <div class="form-group"><label>Instagram</label><input name="social_instagram" value="${(data.social_links?.instagram||'').replace(/"/g,'&quot;')}"></div>
            <div class="form-group"><label>X (Twitter)</label><input name="social_twitter" value="${(data.social_links?.twitter||'').replace(/"/g,'&quot;')}"></div>

            <h3 style="margin:24px 0 12px;font-size:15px;">Why Choose Us (4 items)</h3>
            ${[0,1,2,3].map(i => {
              const item = whyUs[i] || {};
              return `
                <div style="border:1px solid var(--rule);border-radius:6px;padding:16px;margin-bottom:12px;">
                  <div class="form-group"><label>Item ${i+1} — Icon</label><input name="wcu_icon_${i}" value="${(item.icon||'').replace(/"/g,'&quot;')}"></div>
                  <div class="form-group"><label>Item ${i+1} — Title</label><input name="wcu_title_${i}" value="${(item.title||'').replace(/"/g,'&quot;')}"></div>
                  <div class="form-group"><label>Item ${i+1} — Description</label><textarea name="wcu_desc_${i}" rows="2">${item.description||''}</textarea></div>
                </div>`;
            }).join('')}

            <div class="btn-row">
              <button type="button" class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
            </div>
          </form>
        </div>
      `);
    }

    window.saveSettings = async function() {
      try {
        const f = $('#settings-form');
        const why_choose_us = [0,1,2,3].map(i => ({
          icon: f.querySelector('[name="wcu_icon_' + i + '"]').value,
          title: f.querySelector('[name="wcu_title_' + i + '"]').value,
          description: f.querySelector('[name="wcu_desc_' + i + '"]').value,
        })).filter(w => w.title);

        const body = {
          tagline: f.querySelector('[name="tagline"]').value,
          mission_statement: f.querySelector('[name="mission_statement"]').value,
          seo_title: f.querySelector('[name="seo_title"]').value,
          seo_description: f.querySelector('[name="seo_description"]').value,
          contact_email: f.querySelector('[name="contact_email"]').value,
          contact_phone: f.querySelector('[name="contact_phone"]').value,
          social_links: {
            linkedin: f.querySelector('[name="social_linkedin"]').value,
            instagram: f.querySelector('[name="social_instagram"]').value,
            twitter: f.querySelector('[name="social_twitter"]').value,
          },
          why_choose_us,
        };

        await api('/api/admin/site-settings', { method: 'PUT', body: JSON.stringify(body) });
        html($('#settings-alert'), '<div class="alert alert-success">Settings saved successfully.</div>');
        setTimeout(function() { html($('#settings-alert'), ''); }, 3000);
      } catch (err) {
        html($('#settings-alert'), '<div class="alert alert-error">Error: ' + err.message + '</div>');
      }
    };
  </script>
</body>
</html>
